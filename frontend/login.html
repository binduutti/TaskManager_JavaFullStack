<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - Login</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family: "Segoe UI", sans-serif; }
        body { height:100vh; display:flex; align-items:center; justify-content:center; background: linear-gradient(135deg,#eef2ff,#f9fafb); }
        .login-container { background:white; width:380px; padding:40px 35px; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,0.08); }
        .app-title { text-align:center; font-size:26px; font-weight:600; margin-bottom:8px; color:#2f3a8f; }
        .subtitle { text-align:center; font-size:14px; color:#777; margin-bottom:30px; }
        .form-group { margin-bottom:18px; }
        .form-group label { display:block; font-size:14px; margin-bottom:6px; color:#555; }
        .form-control { width:100%; padding:11px 12px; border:1px solid #ddd; border-radius:8px; }
        .password-wrapper { position:relative; }
        .toggle-password { position:absolute; right:10px; top:50%; transform:translateY(-50%); cursor:pointer; font-size:13px; color:#555; }
        .login-btn { width:100%; padding:12px; background:#4f46e5; border:none; color:white; border-radius:8px; cursor:pointer; }
        .login-btn.loading { opacity:0.7; cursor:not-allowed; }
        .error { font-size:13px; color:red; margin-bottom:10px; display:none; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="app-title">Task Manager</div>
        <div class="subtitle">Organize your work efficiently</div>
        <div class="error" id="errorMsg">Please fill in all required fields.</div>
        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="text" id="email" class="form-control" placeholder="Enter your email">
            </div>
            <div style="text-align:center; margin-top:18px;">
    <span>Don't have an account?</span>
    <a href="register.html" style="color:#4f46e5; text-decoration:underline; cursor:pointer;">Register here</a>
</div>
            <div class="form-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" class="form-control" placeholder="Enter password">
                    <span class="toggle-password" onclick="togglePassword()">Show</span>
                </div>
            </div>
            <button type="submit" id="loginBtn" class="login-btn">Login</button>
        </form>
    </div>

    <script>
        function togglePassword(){
            const password = document.getElementById("password");
            const toggle = document.querySelector(".toggle-password");
            if(password.type === "password"){
                password.type = "text";
                toggle.textContent = "Hide";
            } else {
                password.type = "password";
                toggle.textContent = "Show";
            }
        }

        document.getElementById("loginForm").addEventListener("submit", async function(e){
            e.preventDefault();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();
            const error = document.getElementById("errorMsg");
            const button = document.getElementById("loginBtn");

            if(!email || !password) {
                error.style.display = "block";
                return;
            }

            error.style.display = "none";
            button.classList.add("loading");
            button.textContent = "Logging in...";

            try {
                const response = await fetch("http://localhost:8082/api/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });

                if(!response.ok) throw new Error("Invalid Credentials");

                const data = await response.json();
                
                // Store BOTH token and userId from your updated JWTAuthResponse
                localStorage.setItem("token", data.token);
                localStorage.setItem("userId", data.userId); 

                window.location.href = "TaskManager.html";
            } catch(err) {
                error.innerText = "Login failed: Check backend/CORS";
                error.style.display = "block";
            } finally {
                button.classList.remove("loading");
                button.textContent = "Login";
            }
        });
    </script>
</body>
</html>
