<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager - Register</title>
<style>
/* ...your existing CSS here... */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
}
body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background: linear-gradient(135deg,#eef2ff,#f9fafb);
color:#333;
}
.register-container{
background:white;
width:380px;
padding:40px 35px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}
.app-title{
text-align:center;
font-size:26px;
font-weight:600;
margin-bottom:8px;
color:#2f3a8f;
}
.subtitle{
text-align:center;
font-size:14px;
color:#777;
margin-bottom:30px;
}
.form-group{
margin-bottom:18px;
}
.form-group label{
display:block;
font-size:14px;
margin-bottom:6px;
color:#555;
}
.form-control{
width:100%;
padding:11px 12px;
border:1px solid #ddd;
border-radius:8px;
font-size:14px;
transition:0.2s;
}
.form-control:focus{
outline:none;
border-color:#4f46e5;
box-shadow:0 0 0 2px rgba(79,70,229,0.15);
}
.password-wrapper{
position:relative;
}
.toggle-password{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:13px;
color:#555;
}
.register-btn{
width:100%;
padding:12px;
background:#4f46e5;
border:none;
color:white;
font-size:15px;
border-radius:8px;
cursor:pointer;
transition:0.2s;
}
.register-btn:hover{
background:#4338ca;
}
.login{
margin-top:18px;
text-align:center;
font-size:14px;
}
.login a{
color:#4f46e5;
text-decoration:none;
font-weight:500;
}
.login a:hover{
text-decoration:underline;
}
.error{
font-size:13px;
color:red;
margin-bottom:10px;
display:none;
}
@media (max-width:420px){
.register-container{
width:90%;
padding:30px 25px;
}
}
</style>
</head>
<body>
<div class="register-container">
    <div class="app-title">Task Manager</div>
    <div class="subtitle">Create your account</div>
    <div class="error" id="errorMsg" style="display:none;">
        Please fill in all required fields.
    </div>
    <form id="registerForm">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" class="form-control" placeholder="Enter your full name">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" class="form-control" placeholder="Enter your email">
        </div>
        <div class="form-group">
            <label>Password</label>
            <div class="password-wrapper">
                <input type="password" id="password" class="form-control" placeholder="Create password">
                <span class="toggle-password" onclick="togglePassword()">Show</span>
            </div>
        </div>
        <div class="form-group">
            <label>Confirm Password</label>
            <div class="password-wrapper">
                <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm password">
            </div>
        </div>
        <button type="submit" class="register-btn">Register</button>
    </form>
    <div class="login">
        Already have an account? <a href="login.html">Login</a>
    </div>
</div>
<script>
function togglePassword(){
    const password = document.getElementById("password");
    const toggle = document.querySelector(".toggle-password");
    if(password.type === "password"){
        password.type = "text";
        toggle.textContent = "Hide";
    }else{
        password.type = "password";
        toggle.textContent = "Show";
    }
}

document.getElementById("registerForm").addEventListener("submit", async function(e){
    e.preventDefault();
    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const confirm = document.getElementById("confirmPassword").value.trim();
    const error = document.getElementById("errorMsg");

    if(name === "" || email === "" || password === "" || confirm === ""){
        error.textContent = "Please fill in all required fields.";
        error.style.display = "block";
        return;
    }
    if(password !== confirm){
        error.textContent = "Passwords do not match";
        error.style.display = "block";
        return;
    }
    error.style.display = "none";
    try {
        const response = await fetch("http://localhost:8082/api/auth/register",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({name,email,password})
        });
        if(!response.ok) throw new Error("Registration failed");
        alert("Registration successful! Please login.");
        window.location.href = "login.html";
    } catch(err) {
        error.textContent = "Registration failed: " + err.message;
        error.style.display = "block";
    }
});
</script>
</body>
</html>
